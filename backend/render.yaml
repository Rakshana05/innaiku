services:
  - type: web
    name: innaikku-voice-agent
    env: python
    buildCommand: ./build.sh
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 8000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
